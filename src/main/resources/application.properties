spring.application.name=Feedback

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/feedback_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

spring.h2.console.enabled=false

server.error.include-message=always
jwt.secret=${JWT_SECRET:feedback-dev-secret-change-in-prod}