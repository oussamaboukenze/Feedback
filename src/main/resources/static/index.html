<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feedback Hub</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<header class="topbar">
    <div class="brand">
        <img src="/assets/feedback-mark.svg" alt="" aria-hidden="true">
        <div>
            <strong>Feedback Hub</strong>
            <span>Spring Boot</span>
        </div>
    </div>
    <button class="icon-button" id="refreshButton" type="button" title="Actualiser" aria-label="Actualiser">↻</button>
</header>

<main class="layout">
    <section class="panel feedback-panel">
        <div class="panel-title">
            <h1>Saisie d'avis</h1>
            <span id="selectedApplicationName">Application</span>
        </div>

        <form id="feedbackForm" class="feedback-form">
            <label>
                Application
                <select id="applicationSelect" name="applicationClientId" required></select>
            </label>

            <label>
                Composant
                <select id="componentSelect" name="componentId">
                    <option value="">General</option>
                </select>
            </label>

            <fieldset class="rating-field">
                <legend>Note</legend>
                <div class="rating-options" id="ratingOptions">
                    <input type="radio" id="rating5" name="rating" value="5" checked>
                    <label for="rating5">5</label>
                    <input type="radio" id="rating4" name="rating" value="4">
                    <label for="rating4">4</label>
                    <input type="radio" id="rating3" name="rating" value="3">
                    <label for="rating3">3</label>
                    <input type="radio" id="rating2" name="rating" value="2">
                    <label for="rating2">2</label>
                    <input type="radio" id="rating1" name="rating" value="1">
                    <label for="rating1">1</label>
                </div>
            </fieldset>

            <div class="two-columns">
                <label>
                    Nom
                    <input id="authorName" name="authorName" maxlength="120" placeholder="Anonyme">
                </label>
                <label>
                    Email
                    <input id="authorEmail" name="authorEmail" type="email" maxlength="160" placeholder="nom@email.com">
                </label>
            </div>

            <label>
                Commentaire
                <textarea id="comment" name="comment" rows="7" maxlength="2000" required placeholder="Votre avis..."></textarea>
            </label>

            <button class="primary-button" type="submit">Envoyer</button>
        </form>
    </section>

    <section class="panel stats-panel">
        <div class="panel-title">
            <h2>Tableau de bord</h2>
            <span id="totalFeedbacks">0 avis</span>
        </div>

        <div class="metrics">
            <div class="metric accent-green">
                <span>Moyenne</span>
                <strong id="averageRating">0.0</strong>
            </div>
            <div class="metric accent-amber">
                <span>En attente</span>
                <strong id="pendingCount">0</strong>
            </div>
            <div class="metric accent-red">
                <span>Rejetes</span>
                <strong id="rejectedCount">0</strong>
            </div>
        </div>

        <div class="distribution" id="ratingDistribution"></div>

        <div class="manager-grid">
            <form id="applicationForm" class="mini-form">
                <h3>Application</h3>
                <input id="newApplicationName" required maxlength="120" placeholder="Nom">
                <input id="newApplicationDescription" maxlength="500" placeholder="Description">
                <button type="submit">Ajouter</button>
            </form>

            <form id="componentForm" class="mini-form">
                <h3>Composant</h3>
                <input id="newComponentName" required maxlength="120" placeholder="Nom">
                <input id="newComponentDescription" maxlength="500" placeholder="Description">
                <button type="submit">Ajouter</button>
            </form>
        </div>
    </section>

    <section class="panel list-panel">
        <div class="panel-title">
            <h2>Avis recents</h2>
            <span id="listCount">0</span>
        </div>
        <div class="feedback-list" id="feedbackList"></div>
    </section>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="/app.js"></script>
</body>
</html>
