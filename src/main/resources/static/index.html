<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feedback Hub</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .user-pill {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-name {
            font-size: 0.88rem;
            color: var(--muted);
        }
        .logout-btn {
            height: 36px;
            padding: 0 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            color: var(--red);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
        }
        .logout-btn:hover { background: var(--red-soft); }
    </style>
</head>
<body>
<header class="topbar">
    <div class="brand">
        <img src="/assets/feedback-mark.svg" alt="" aria-hidden="true">
        <div>
            <strong>Feedback Hub</strong>
            <span>Tableau de bord</span>
        </div>
    </div>
    <div class="user-pill">
        <span class="user-name" id="userNameDisplay"></span>
        <button class="icon-button" id="refreshButton" type="button" title="Actualiser" aria-label="Actualiser">↻</button>
        <button class="logout-btn" id="logoutButton" type="button">Déconnexion</button>
    </div>
</header>

<main class="layout">
    <section class="panel stats-panel">
        <div class="panel-title">
            <h2>Tableau de bord</h2>
            <span id="totalFeedbacks">0 avis</span>
        </div>

        <div class="metrics">
            <div class="metric accent-green">
                <span>Moyenne</span>
                <strong id="averageRating">0.0</strong>
            </div>
            <div class="metric accent-amber">
                <span>En attente</span>
                <strong id="pendingCount">0</strong>
            </div>
            <div class="metric accent-red">
                <span>Rejetés</span>
                <strong id="rejectedCount">0</strong>
            </div>
        </div>

        <div class="distribution" id="ratingDistribution"></div>

        <div class="manager-grid">
            <form id="applicationForm" class="mini-form">
                <h3>Application</h3>
                <input id="newApplicationName" required maxlength="120" placeholder="Nom">
                <input id="newApplicationDescription" maxlength="500" placeholder="Description">
                <button type="submit">Ajouter</button>
            </form>

            <form id="componentForm" class="mini-form">
                <h3>Composant</h3>
                <input id="newComponentName" required maxlength="120" placeholder="Nom">
                <input id="newComponentDescription" maxlength="500" placeholder="Description">
                <button type="submit">Ajouter</button>
            </form>
        </div>
    </section>

    <section class="panel list-panel" style="grid-column: 1 / -1">
        <div class="panel-title">
            <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
                <h2 style="margin:0">Avis récents</h2>
                <label style="display:flex;align-items:center;gap:8px;color:var(--muted);font-size:0.86rem;font-weight:700;margin:0">
                    Application
                    <select id="applicationSelect" style="height:36px;padding:0 10px;font-size:0.86rem;border:1px solid var(--line);border-radius:8px;background:#fbfcfa;min-width:160px"></select>
                </label>
            </div>
            <span id="listCount">0</span>
        </div>
        <div class="feedback-list" id="feedbackList"></div>
    </section>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script src="/app.js"></script>
</body>
</html>
