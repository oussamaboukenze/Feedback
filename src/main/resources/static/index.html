<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feedback Hub</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .user-pill {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-name {
            font-size: 0.88rem;
            color: var(--muted);
        }
        .logout-btn {
            height: 36px;
            padding: 0 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            color: var(--red);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
        }
        .logout-btn:hover { background: var(--red-soft); }
    </style>
</head>
<body>
<header class="topbar">
    <div class="brand">
        <img src="/assets/feedback-mark.svg" alt="" aria-hidden="true">
        <div>
            <strong>Feedback Hub</strong>
            <span>Tableau de bord</span>
        </div>
    </div>
    <div class="user-pill">
        <span class="user-name" id="userNameDisplay"></span>
        <button class="icon-button" id="refreshButton" type="button" title="Actualiser" aria-label="Actualiser">↻</button>
        <button class="logout-btn" id="logoutButton" type="button">Déconnexion</button>
    </div>
</header>

<main class="layout">
    <section class="panel stats-panel">
        <div class="panel-title">
            <h2>Tableau de bord</h2>
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
                <span id="totalFeedbacks">0 avis</span>
                <label style="display:flex;align-items:center;gap:8px;color:var(--muted);font-size:0.86rem;font-weight:700;margin:0">
                    <select id="applicationSelect" style="height:36px;padding:0 10px;font-size:0.86rem;border:1px solid var(--line);border-radius:8px;background:#fbfcfa;min-width:160px"></select>
                </label>
                <button id="qrBtn" type="button" title="Lien & QR Code" style="height:36px;padding:0 12px;border:1px solid var(--line);border-radius:8px;background:var(--panel);font-size:0.85rem;font-weight:700;cursor:pointer;color:var(--green)">Lien & QR</button>
            </div>
        </div>

        <div class="metrics">
            <div class="metric accent-green">
                <span>Moyenne</span>
                <strong id="averageRating">0.0</strong>
            </div>
            <div class="metric accent-amber">
                <span>En attente</span>
                <strong id="pendingCount">0</strong>
            </div>
            <div class="metric accent-red">
                <span>Rejetés</span>
                <strong id="rejectedCount">0</strong>
            </div>
        </div>

        <div class="distribution" id="ratingDistribution"></div>

        <div class="manager-grid">
            <form id="applicationForm" class="mini-form">
                <h3>Application</h3>
                <input id="newApplicationName" required maxlength="120" placeholder="Nom">
                <input id="newApplicationDescription" maxlength="500" placeholder="Description">
                <button type="submit">Ajouter</button>
            </form>

            <form id="componentForm" class="mini-form">
                <h3>Composant</h3>
                <input id="newComponentName" required maxlength="120" placeholder="Nom">
                <input id="newComponentDescription" maxlength="500" placeholder="Description">
                <button type="submit">Ajouter</button>
            </form>
        </div>
    </section>

    <section class="panel list-panel" style="grid-column: 1 / -1">
        <div class="panel-title">
            <h2 style="margin:0">Avis récents</h2>
            <span id="listCount">0</span>
        </div>
        <div class="feedback-list" id="feedbackList"></div>
    </section>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<div id="qrModal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.45);align-items:center;justify-content:center">
    <div style="background:var(--panel);border-radius:12px;padding:32px;max-width:420px;width:calc(100% - 48px);box-shadow:var(--shadow);position:relative">
        <button id="qrModalClose" type="button" style="position:absolute;top:12px;right:14px;border:none;background:none;font-size:1.5rem;line-height:1;cursor:pointer;color:var(--muted)">×</button>
        <h3 id="qrModalTitle" style="margin:0 0 4px;font-size:1.1rem"></h3>
        <p style="margin:0 0 16px;font-size:0.86rem;color:var(--muted)">Partagez ce lien — les utilisateurs verront directement votre application.</p>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
            <input id="qrLink" readonly style="flex:1;height:38px;padding:0 10px;border:1px solid var(--line);border-radius:8px;background:#fbfcfa;font-size:0.8rem;color:var(--ink)">
            <button id="qrCopyBtn" type="button" style="height:38px;padding:0 14px;border:1px solid var(--line);border-radius:8px;background:var(--panel);font-weight:700;cursor:pointer;white-space:nowrap">Copier</button>
        </div>
        <div style="display:flex;justify-content:center">
            <img id="qrImage" alt="QR Code" style="width:200px;height:200px;border:1px solid var(--line);border-radius:8px">
        </div>
    </div>
</div>

<script src="/app.js"></script>
</body>
</html>
